    "/v1/eval-runs": {
      "post": {
        "tags": [
          "eval-runs"
        ],
        "summary": "Create Eval Run",
        "description": "Start a durable eval run and return the parent job ID to poll.\n\nFor prompt evals, provide explicit `targets` to override the configured\nprompt targets, or omit `targets` to use the organization's configured\nscheduled prompt targets. For API Performance evals, explicit `targets` or\n`models` override the stored configuration; when omitted, Sapient uses\nconfigured scheduled targets or legacy configured models. Custom eval runs\nuse `custom_eval_ids` when provided, otherwise the configured custom eval\nset for the organization.\n\nFor API Performance source types backed by a source (`rest_api`, `sdk`, or\n`cli`), provide `source_id` from `api-performance sources list`, or omit it\nwhen `operation_ids`, `eval_ids`, or the requested `source_type` identify a\nsingle source. `operation_ids` are Sapient API Performance operation IDs,\nnot OpenAPI operationId strings.\n\nEvery run is queued through the durable job queue. The response `id` is the\n`eval_run_id` to pass to `GET /v1/eval-runs/{eval_run_id}`. When Sapient can\ndetermine the runnable work, the response also includes `dispatch_id` and\ninitial queued progress for the child jobs.",
        "operationId": "eval_runs_create",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "oneOf": [
                  {
                    "$ref": "#/components/schemas/PublicPromptEvalRunRequest"
                  },
                  {
                    "$ref": "#/components/schemas/PublicApiPerformanceEvalRunRequest"
                  }
                ],
                "title": "Request",
                "discriminator": {
                  "propertyName": "type",
                  "mapping": {
                    "prompts": "#/components/schemas/PublicPromptEvalRunRequest",
                    "api_performance": "#/components/schemas/PublicApiPerformanceEvalRunRequest"
                  }
                }
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/PublicEvalRunResponse"
                }
              }
            }
          },
          "400": {
            "description": "The request is valid, but Sapient could not determine what to run from either the request payload or saved configuration.",
            "content": {
              "application/json": {
                "schema": {
                  "properties": {
                    "detail": {
                      "type": "string"
                    }
                  },
                  "type": "object",
                  "required": [
                    "detail"
                  ]
                },
                "examples": {
                  "missing_prompt_targets": {
                    "summary": "No configured prompt targets",
                    "value": {
                      "detail": "No configured prompt targets were found for this organization. Configure prompt targets first or include targets in the request."
                    }
                  },
                  "missing_api_performance_targets": {
                    "summary": "No configured API Performance targets",
                    "value": {
                      "detail": "No configured API Performance targets or models were found for cli. Configure eval targets for this source or include targets/models in the request."
                    }
                  },
                  "ambiguous_api_performance_source": {
                    "summary": "API Performance source is ambiguous",
                    "value": {
                      "detail": "source_id is required for source_type=cli unless operation_ids or eval_ids identify a single source. Get source IDs from api-performance sources list or api-performance evals list."
                    }
                  },
                  "missing_custom_eval_ids": {
                    "summary": "No configured custom evals",
                    "value": {
                      "detail": "No custom eval IDs were provided and no configured custom evals were found for this organization. Configure custom evals or include custom_eval_ids in the request."
                    }
                  }
                }
              }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/HTTPValidationError"
                }
              }
            }
          }
        },
        "security": [
          {
            "SapientApiKeyAuth": []
          }
        ],
        "x-stainless-method": "eval_runs.create"
      }
    },
    "/v1/eval-runs/{eval_run_id}": {
      "get": {
        "tags": [
          "eval-runs"
