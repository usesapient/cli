name: Validate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test
        run: go test ./...

      - name: Validate shaped command tree
        run: go run ./cmd/sapient-shaped --usage >/dev/null

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
