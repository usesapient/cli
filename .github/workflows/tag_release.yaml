name: Tag Release

on:
  push:
    branches:
      - main
    paths:
      - ".speakeasy/gen.yaml"
      - ".speakeasy/gen.lock"
      - "internal/cli/version.go"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_PUSH_TOKEN: ${{ secrets.CLI_GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CLI_GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Extract version
        id: version
        run: |
          version="$(ruby -ryaml -e 'puts YAML.load_file(".speakeasy/gen.yaml").fetch("cli").fetch("version").to_s')"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::.speakeasy/gen.yaml cli.version must be semver, got '${version}'"
            exit 1
          fi
          if ! grep -Fq "var Version = \"${version}\"" internal/cli/version.go; then
            echo "::error::internal/cli/version.go does not match .speakeasy/gen.yaml cli.version ${version}"
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Verify release token
        run: |
          if [ -z "${TAG_PUSH_TOKEN:-}" ]; then
            echo "::error::CLI_GITHUB_TOKEN is required so the pushed tag triggers the Release workflow"
            exit 1
          fi

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test
        run: go test ./...

      - name: Validate shaped command tree
        run: go run ./cmd/sapient-shaped --usage >/dev/null

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      - name: Create tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" >/dev/null 2>&1; then
              echo "Release ${tag} already exists; nothing to tag."
              exit 0
            fi
            echo "::error::Tag ${tag} already exists, but no GitHub release exists. Resolve the failed tag manually before retrying."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "refs/tags/${tag}"
